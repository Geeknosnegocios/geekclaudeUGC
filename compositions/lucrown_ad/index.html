<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=720, height=1280" />
    <title>Lucrown UGC Ad — Geek CLAUDE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@600;800&display=block" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 720px;
        height: 1280px;
        overflow: hidden;
        background: #000;
        font-family: 'Inter', system-ui, sans-serif;
      }

      /* --- VIDEO CLIPS --- */
      .clip-video {
        position: absolute;
        inset: 0;
        width: 720px;
        height: 1280px;
        object-fit: cover;
        opacity: 0;
        z-index: 1;
      }

      /* --- WHITE FLASH (between scenes) --- */
      .flash {
        position: absolute;
        inset: 0;
        background: #fff;
        opacity: 0;
        z-index: 50;
        pointer-events: none;
      }

      /* --- GRAIN OVERLAY (film texture) --- */
      #grain-overlay {
        position: absolute; inset: 0;
        pointer-events: none; z-index: 100;
      }
      #grain-overlay .grain-texture {
        position: absolute; top: -50%; left: -50%;
        width: 200%; height: 200%;
        background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        opacity: 0.10;
        animation: hf-grain-noise 0.5s steps(1) infinite;
      }
      @keyframes hf-grain-noise {
        0%, 100% { transform: translate(0,0); }
        10% { transform: translate(-5%,-5%); }
        20% { transform: translate(-10%,5%); }
        30% { transform: translate(5%,-10%); }
        40% { transform: translate(-5%,15%); }
        50% { transform: translate(-10%,5%); }
        60% { transform: translate(15%,0); }
        70% { transform: translate(0,10%); }
        80% { transform: translate(-15%,0); }
        90% { transform: translate(10%,5%); }
      }

      /* --- VIGNETTE --- */
      #hf-vignette {
        position: absolute; inset: 0;
        pointer-events: none; z-index: 90;
        background: radial-gradient(ellipse at center,
          transparent 45%,
          rgba(0,0,0,0.65) 100%);
      }

      /* --- TIKTOK RED HIGHLIGHT CAPTIONS --- */
      .caption {
        position: absolute;
        bottom: 280px;
        left: 0;
        width: 100%;
        text-align: center;
        padding: 0 40px;
        opacity: 0;
        z-index: 60;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 6px 8px;
      }
      .word {
        font-family: 'Montserrat', sans-serif;
        font-weight: 900;
        font-size: 56px;
        text-transform: uppercase;
        color: #fff;
        line-height: 1;
        letter-spacing: 0.01em;
        padding: 6px 12px 8px;
        position: relative;
        display: inline-block;
        text-shadow: 0 4px 14px rgba(0,0,0,0.55);
        transform-origin: 50% 60%;
      }
      .word.hl {
        color: #fff;
        background: linear-gradient(135deg, #ff1745 0%, #df1238 100%);
        border-radius: 10px;
        box-shadow: 0 8px 24px rgba(229,20,58,0.45);
        text-shadow: none;
      }

      /* --- LOWER THIRD (brand pill) --- */
      .lower-third {
        position: absolute;
        bottom: 140px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.85);
        border-radius: 999px;
        padding: 16px 32px;
        display: flex;
        align-items: center;
        gap: 14px;
        opacity: 0;
        z-index: 70;
        backdrop-filter: blur(6px);
        box-shadow: 0 12px 40px rgba(0,0,0,0.45);
      }
      .lower-third .dot {
        width: 10px; height: 10px;
        border-radius: 50%;
        background: #ff1745;
        box-shadow: 0 0 0 4px rgba(255,23,69,0.25);
      }
      .lower-third .brand {
        color: #fff;
        font-size: 26px;
        font-weight: 900;
        letter-spacing: 0.06em;
      }
      .lower-third .price {
        color: #ffd166;
        font-size: 20px;
        font-weight: 800;
      }

      /* --- END CTA --- */
      .cta {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 28px;
        background: rgba(0,0,0,0.65);
        opacity: 0;
        z-index: 80;
      }
      .cta h1 {
        color: #fff;
        font-family: 'Montserrat', sans-serif;
        font-size: 80px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: -0.02em;
        text-align: center;
        line-height: 0.95;
        padding: 0 40px;
      }
      .cta h1 .accent {
        color: #ff1745;
        display: block;
        margin-top: 8px;
      }
      .pill-wrap { position: relative; display: inline-block; }
      .pill {
        background: linear-gradient(135deg, #ff1745, #df1238);
        color: #fff;
        font-family: 'Montserrat', sans-serif;
        font-size: 28px;
        font-weight: 900;
        padding: 20px 56px;
        border-radius: 999px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        box-shadow: 0 16px 40px rgba(255,23,69,0.5);
        position: relative;
        overflow: hidden;
      }
      .pill .shimmer {
        position: absolute; inset: 0;
        background: linear-gradient(120deg,
          transparent 0%,
          transparent calc(var(--shimmer-pos, -30%) - 10%),
          rgba(255,255,255,0.65) var(--shimmer-pos, -30%),
          transparent calc(var(--shimmer-pos, -30%) + 10%),
          transparent 100%);
        mix-blend-mode: overlay;
        pointer-events: none;
      }

      /* --- PROGRESS BAR --- */
      .progress {
        position: absolute;
        top: 0; left: 0;
        height: 5px; width: 100%;
        background: rgba(255,255,255,0.12);
        z-index: 110;
      }
      .progress .bar {
        height: 100%;
        background: linear-gradient(90deg, #ff1745, #ffd166);
        transform-origin: 0 50%;
        transform: scaleX(0);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="15.5"
      data-width="720"
      data-height="1280"
    >
      <!-- AUDIO -->
      <audio class="clip" id="voiceover" data-start="0" data-duration="15.5" data-track-index="20" src="voiceover.mp3"></audio>
      <audio class="clip" id="music"     data-start="0" data-duration="15.5" data-track-index="21" src="music.mp3" data-volume="0.18"></audio>

      <!-- VIDEO CLIPS (4 × ~4s with overlap for crossfades) -->
      <video class="clip clip-video" id="v1" data-start="0"    data-duration="4.0" data-track-index="1" muted playsinline src="clip_01.mp4"></video>
      <video class="clip clip-video" id="v2" data-start="3.7"  data-duration="4.0" data-track-index="2" muted playsinline src="clip_02.mp4"></video>
      <video class="clip clip-video" id="v3" data-start="7.4"  data-duration="4.0" data-track-index="3" muted playsinline src="clip_03.mp4"></video>
      <video class="clip clip-video" id="v4" data-start="11.1" data-duration="4.5" data-track-index="4" muted playsinline src="clip_04.mp4"></video>

      <!-- WHITE FLASH TRANSITIONS (at each clip boundary) -->
      <div class="clip flash" id="flash1" data-start="3.55" data-duration="0.3" data-track-index="51"></div>
      <div class="clip flash" id="flash2" data-start="7.25" data-duration="0.3" data-track-index="52"></div>
      <div class="clip flash" id="flash3" data-start="10.95" data-duration="0.3" data-track-index="53"></div>

      <!-- VIGNETTE -->
      <div id="hf-vignette"></div>

      <!-- GRAIN -->
      <div id="grain-overlay"><div class="grain-texture"></div></div>

      <!-- PROGRESS BAR -->
      <div class="clip progress" id="progress" data-start="0" data-duration="15.5" data-track-index="40">
        <div class="bar" id="progressBar"></div>
      </div>

      <!-- KINETIC CAPTIONS (TikTok red highlight on key words) -->
      <div class="clip caption" id="cap1" data-start="0.0" data-duration="1.7" data-track-index="30">
        <span class="word">VOCÊ AINDA USA</span>
        <span class="word hl">CREME NORMAL?</span>
      </div>
      <div class="clip caption" id="cap2" data-start="1.7" data-duration="1.5" data-track-index="30">
        <span class="word">PORO E</span>
        <span class="word hl">TEXTURA</span>
      </div>
      <div class="clip caption" id="cap3" data-start="4.0" data-duration="2.3" data-track-index="30">
        <span class="word">EU TAMBÉM ACHAVA.</span>
        <span class="word">AÍ DESCOBRI</span>
      </div>
      <div class="clip caption" id="cap4" data-start="6.3" data-duration="1.8" data-track-index="30">
        <span class="word hl">ÓLEO EM GOTAS</span>
      </div>
      <div class="clip caption" id="cap5" data-start="8.1" data-duration="2.2" data-track-index="30">
        <span class="word">5 DIAS DEPOIS,</span>
        <span class="word hl">PELE TIPO VIDRO</span>
      </div>
      <div class="clip caption" id="cap6" data-start="10.3" data-duration="1.6" data-track-index="30">
        <span class="word">EU NÃO</span>
        <span class="word hl">ACREDITEI</span>
      </div>

      <!-- LOWER-THIRD BRAND -->
      <div class="clip lower-third" id="lt" data-start="11.5" data-duration="3.5" data-track-index="35">
        <div class="dot"></div>
        <div class="brand">LUCROWN</div>
        <div class="price">a partir de R$ 47</div>
      </div>

      <!-- END CTA CARD -->
      <div class="clip cta" id="cta" data-start="13.8" data-duration="1.7" data-track-index="45">
        <h1>LINK NA <span class="accent">SACOLINHA</span></h1>
        <div class="pill-wrap">
          <div class="pill" id="ctaPill">
            QUERO AGORA
            <span class="shimmer"></span>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // VIDEO CROSSFADES
      [
        { id: "v1", start: 0,    dur: 4.0 },
        { id: "v2", start: 3.7,  dur: 4.0 },
        { id: "v3", start: 7.4,  dur: 4.0 },
        { id: "v4", start: 11.1, dur: 4.5 },
      ].forEach(({id, start, dur}) => {
        tl.fromTo(`#${id}`, { opacity: 0 }, { opacity: 1, duration: 0.35, ease: "power2.out" }, start);
        tl.to(`#${id}`, { opacity: 0, duration: 0.35, ease: "power2.in" }, start + dur - 0.35);
      });

      // WHITE FLASHES BETWEEN CLIPS
      ["flash1", "flash2", "flash3"].forEach((id, i) => {
        const t = 3.55 + i * 3.7;
        tl.fromTo(`#${id}`, { opacity: 0 }, { opacity: 0.95, duration: 0.12, ease: "power2.out" }, t);
        tl.to(`#${id}`, { opacity: 0, duration: 0.18, ease: "power2.in" }, t + 0.12);
      });

      // CAPTIONS: word stagger entrance
      [
        { id: "cap1", start: 0.0, dur: 1.7 },
        { id: "cap2", start: 1.7, dur: 1.5 },
        { id: "cap3", start: 4.0, dur: 2.3 },
        { id: "cap4", start: 6.3, dur: 1.8 },
        { id: "cap5", start: 8.1, dur: 2.2 },
        { id: "cap6", start: 10.3, dur: 1.6 },
      ].forEach(({id, start, dur}) => {
        tl.set(`#${id}`, { opacity: 1 }, start);
        tl.fromTo(`#${id} .word`,
          { opacity: 0, y: 20, scale: 0.85 },
          { opacity: 1, y: 0, scale: 1, duration: 0.28, ease: "back.out(2.4)", stagger: 0.08 },
          start
        );
        tl.to(`#${id}`, { opacity: 0, duration: 0.25, ease: "power2.in" }, start + dur - 0.25);
      });

      // LOWER THIRD slide-up
      tl.fromTo("#lt",
        { opacity: 0, y: 40 },
        { opacity: 1, y: 0, duration: 0.55, ease: "back.out(1.6)" },
        11.5
      );
      tl.to("#lt", { opacity: 0, y: -20, duration: 0.4, ease: "power2.in" }, 14.8);

      // END CTA zoom-in
      tl.fromTo("#cta",
        { opacity: 0, scale: 1.18 },
        { opacity: 1, scale: 1, duration: 0.45, ease: "back.out(1.8)" },
        13.8
      );

      // SHIMMER SWEEP on CTA pill (after card enters)
      tl.fromTo("#ctaPill .shimmer",
        { "--shimmer-pos": "-30%" },
        { "--shimmer-pos": "130%", duration: 1.0, ease: "power2.inOut" },
        14.3
      );

      // PROGRESS BAR fills linearly
      tl.fromTo("#progressBar",
        { scaleX: 0 },
        { scaleX: 1, duration: 15.5, ease: "none" },
        0
      );

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
